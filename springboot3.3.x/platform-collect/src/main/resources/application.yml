spring:
  rabbitmq:
    host: 192.168.80.137
    port: 5672
    username: admin
    password: 123456
    virtual-host: /
    # 发布确认类型
    publisher-confirm-type: correlated
    # 发布返回
    publisher-returns: true
    # 模板配置
    template:
      # 必须设置为true，否则不会收到服务端的返回信息
      mandatory: true
      # 重试配置
      retry:
        enabled: true
        initial-interval: 1